<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    window.addEventListener('error', function(e) {
      console.error('Diagnostic error caught:', e);
      var root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="padding: 30px; color: #ef4444; background: #000; font-family: monospace; border: 1px solid #1f1f1f; max-width: 600px; margin: 50px auto; border-radius: 8px; box-sizing: border-box; text-align: left;">' +
          '<h1 style="font-size: 18px; margin-bottom: 10px; color: #fff; font-weight: 600; margin-top: 0;">Runtime Crash Detected</h1>' +
          '<p style="font-size: 14px; color: #a1a1aa; line-height: 1.5; margin: 0 0 15px 0;">Message: ' + e.message + '</p>' +
          '<pre style="font-size: 12px; color: #71717a; white-space: pre-wrap; word-break: break-all; margin: 0; background: #050505; padding: 15px; border-radius: 4px; border: 1px solid #111;">' + (e.error ? e.error.stack : '') + '</pre>' +
          '</div>';
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Diagnostic promise rejection:', e);
      var root = document.getElementById('root');
      if (root) {
        root.innerHTML = '<div style="padding: 30px; color: #ef4444; background: #000; font-family: monospace; border: 1px solid #1f1f1f; max-width: 600px; margin: 50px auto; border-radius: 8px; box-sizing: border-box; text-align: left;">' +
          '<h1 style="font-size: 18px; margin-bottom: 10px; color: #fff; font-weight: 600; margin-top: 0;">Unhandled Rejection Detected</h1>' +
          '<p style="font-size: 14px; color: #a1a1aa; line-height: 1.5; margin: 0 0 15px 0;">Reason: ' + String(e.reason) + '</p>' +
          '<pre style="font-size: 12px; color: #71717a; white-space: pre-wrap; word-break: break-all; margin: 0; background: #050505; padding: 15px; border-radius: 4px; border: 1px solid #111;">' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre>' +
          '</div>';
      }
    });
  </script>
  <link rel="icon" type="image/svg+xml" href="/video.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Upload and transcode videos to HLS with adaptive bitrate streaming — powered by FFmpeg." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <title>Video Transcoder</title>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
